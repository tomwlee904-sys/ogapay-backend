<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request to Join - OgaPay</title>
<script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ogapay-theme')||'light')}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{--bg:#ffffff;--bg2:#f7f9fc;--card:#ffffff;--border:#e4e9f1;--text:#101525;--text2:#66738a;--text3:#98a6ba;--accent:#7C3AED;--shadow-soft:0 2px 8px rgba(16,21,37,.05);--radius:14px;--radius-sm:10px;--nav-h:60px}
[data-theme="dark"]{--bg:#080b13;--bg2:#0d111d;--card:#111725;--border:#222b3c;--text:#f4f7fb;--text2:#9aa7bc;--text3:#667186;--accent:#A78BFA;--shadow-soft:0 2px 8px rgba(0,0,0,.22)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}a{color:inherit;text-decoration:none}button,input,textarea{font:inherit}button{cursor:pointer}.page{width:min(600px,calc(100% - 32px));margin:40px auto;padding:34px 0 72px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-soft);padding:32px}.card h1{font-family:Outfit;font-size:28px;font-weight:800;margin:0 0 6px}.card p{color:var(--text2);font-size:14px;margin:0 0 20px;line-height:1.6}.fg{margin-bottom:16px}.fg label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}.fg input,.fg textarea{width:100%;padding:0 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;height:48px}.fg textarea{height:100px;padding:12px 14px;resize:vertical}.fg input:focus,.fg textarea:focus{border-color:var(--accent)}.btn{height:48px;padding:0 24px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:all .2s;cursor:pointer}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn:hover{border-color:var(--border2);box-shadow:var(--shadow-soft)}.btn.primary:hover{box-shadow:0 6px 24px rgba(124,58,237,.3)}.btn.full{width:100%;justify-content:center}.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 28px;border-radius:999px;background:#0d1323;color:#fff;font-weight:700;font-size:14px;z-index:999;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}[data-theme="dark"] .toast{background:#f4f7fb;color:#0d1323}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>Request to Join</h1>
    <p id="commInfo">This community requires approval before you can join.</p>
    <div class="fg"><label>Why do you want to join?</label><textarea id="reqMsg" placeholder="Tell the community leaders about yourself and why you'd like to be a member..."></textarea></div>
    <button class="btn primary full" onclick="submitRequest()"><i class="ti ti-send"></i>Submit Request</button>
    <a href="communities.html" style="display:block;text-align:center;margin-top:12px;color:var(--text3);font-size:13px;font-weight:600">Back to communities</a>
  </div>
</div>
<div class="toast" id="toast">Done</div>
<script>
async function submitRequest() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || params.get('id');
  const msg = document.getElementById('reqMsg').value.trim();
  if (!slug) { showToast('No community specified'); return; }
  try {
    const res = await fetch('/api/v1/communities/' + slug + '/join', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg || null }),
    });
    if (res.ok) {
      showToast('Request submitted!');
      setTimeout(() => location.href='community-profile.html?id=' + slug, 1200);
    } else {
      const d = await res.json();
      showToast(d.message || 'Could not submit request');
    }
  } catch(e) { showToast('Network error'); }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
