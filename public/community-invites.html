<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitations - OgaPay</title>
<script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ogapay-theme')||'light')}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{--bg:#ffffff;--bg2:#f7f9fc;--card:#ffffff;--border:#e4e9f1;--border2:#d5deea;--text:#101525;--text2:#66738a;--text3:#98a6ba;--accent:#7C3AED;--green:#16a34a;--shadow:0 4px 16px rgba(16,21,37,.07),0 1px 4px rgba(16,21,37,.04);--shadow-soft:0 2px 8px rgba(16,21,37,.05);--radius:14px;--radius-sm:10px;--nav-h:60px}
[data-theme="dark"]{--bg:#080b13;--bg2:#0d111d;--card:#111725;--border:#222b3c;--border2:#2d384d;--text:#f4f7fb;--text2:#9aa7bc;--text3:#667186;--accent:#A78BFA;--shadow:0 4px 16px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.18);--shadow-soft:0 2px 8px rgba(0,0,0,.22)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}button{cursor:pointer}
.nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(255,255,255,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(18px)}[data-theme="dark"] .nav{background:rgba(8,11,19,.92)}
.nav-inner{height:100%;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:22px;width:min(1200px,calc(100% - 48px));margin:0 auto}.brand{display:flex;align-items:center;gap:10px;font-family:"Outfit";font-weight:800;font-size:19px}.logo{width:34px;height:34px;border-radius:9px;background:var(--primary);color:var(--bg);display:grid;place-items:center;font-size:18px}.nav-links{display:flex;justify-content:center;gap:4px}.nav-link{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;color:var(--text2);font-size:14px;font-weight:700}.nav-link:hover,.nav-link.active{background:var(--bg2);color:var(--text)}.nav-actions{display:flex;align-items:center;gap:8px}.icon-btn,.menu-btn{width:36px;height:36px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);display:grid;place-items:center}.pill-btn{height:36px;border:1.5px solid var(--border2);border-radius:999px;background:var(--primary);color:var(--bg);display:inline-flex;align-items:center;gap:8px;padding:0 16px;font-weight:800;font-size:13px}
.page{width:min(900px,calc(100% - 48px));margin:0 auto;padding:34px 0 72px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-soft)}.btn{height:44px;padding:0 20px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:all .2s;cursor:pointer}.btn:hover{border-color:var(--border2);box-shadow:var(--shadow)}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn.sm{height:34px;padding:0 12px;font-size:12px}.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800}.badge-accent{background:rgba(124,58,237,.12);color:var(--accent)}.badge-green{background:rgba(22,163,74,.12);color:var(--green)}.small{font-size:12px;color:var(--text3)}.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.space{justify-content:space-between}.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 28px;border-radius:999px;background:var(--primary);color:var(--bg);font-weight:700;font-size:14px;z-index:999;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.invite-item{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;transition:all .15s}.invite-item:hover{border-color:var(--border2)}.invite-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;color:#fff;flex-shrink:0}.invite-info{flex:1;min-width:0}.invite-info h3{margin:0;font-size:14px;font-weight:800}.invite-info .i-meta{font-size:11px;color:var(--text3);margin-top:2px}.invite-actions{display:flex;gap:6px;flex-shrink:0}
</style>
</head>
<body>
<header class="nav"><div class="nav-inner"><a href="index.html" class="brand"><span class="logo">O</span>OgaPay</a><nav class="nav-links"><a class="nav-link" href="tasks.html"><i class="ti ti-briefcase"></i>Tasks</a><a class="nav-link" href="store.html"><i class="ti ti-discount-2"></i>Deals</a><a class="nav-link active" href="communities.html"><i class="ti ti-users-group"></i>Communities</a><a class="nav-link" href="dashboard.html"><i class="ti ti-dashboard"></i>Dashboard</a></nav><div class="nav-actions"><a class="pill-btn" href="post-task.html"><i class="ti ti-square-plus"></i>Post Task</a><button class="icon-btn" id="themeToggle" onclick="t()"><i class="ti ti-sun" id="ti"></i></button><button class="menu-btn" onclick="document.querySelector('.drawer').classList.toggle('open')"><i class="ti ti-menu-2"></i></button></div></div></header>

<div class="page">
  <div class="row space" style="margin-bottom:20px">
    <div><h1 style="font-family:Outfit;font-size:28px;font-weight:800;margin:0">Invitations</h1><p style="color:var(--text2);font-size:14px;margin:2px 0 0">Pending community invitations</p></div>
    <a class="btn" href="communities.html"><i class="ti ti-arrow-left"></i>Communities</a>
  </div>
  <div id="inviteList"><p style="color:var(--text3);text-align:center;padding:60px 0">Loading invitations...</p></div>
</div>

<div class="toast" id="toast">Done</div>

<script>
async function init() {
  try {
    const res = await fetch('/api/v1/communities/invites/mine');
    if (!res.ok) { document.getElementById('inviteList').innerHTML = '<p style="color:var(--text3);text-align:center;padding:60px 0">Sign in to see your invitations</p>'; return; }
    const data = await res.json();
    const invites = data.data || data;
    if (invites.length === 0) {
      document.getElementById('inviteList').innerHTML = '<p style="color:var(--text3);text-align:center;padding:60px 0"><i class="ti ti-mail-opened" style="font-size:32px;display:block;margin-bottom:8px"></i>No pending invitations</p>';
      return;
    }
    document.getElementById('inviteList').innerHTML = invites.map(i => `
      <div class="invite-item">
        <div class="invite-icon" style="background:${i.community?.accentColor||'#7C3AED'}"><i class="ti ti-users-group"></i></div>
        <div class="invite-info">
          <h3>${i.community?.name||'Unknown Community'}</h3>
          <div class="i-meta">Invited by ${i.inviter?.username||'someone'} · ${i.community?.description?.slice(0,60)||''}</div>
        </div>
        <div class="invite-actions">
          <button class="btn sm primary" onclick="respond('${i.id}','accept')"><i class="ti ti-check"></i>Accept</button>
          <button class="btn sm" onclick="respond('${i.id}','decline')"><i class="ti ti-x"></i>Decline</button>
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('inviteList').innerHTML = '<p style="color:var(--text3);text-align:center;padding:60px 0">Could not load invitations</p>';
  }
}

async function respond(inviteId, action) {
  try {
    const res = await fetch('/api/v1/communities/invites/' + inviteId, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action }),
    });
    if (res.ok) {
      showToast(action === 'accept' ? 'Joined community!' : 'Invite declined');
      setTimeout(() => location.reload(), 800);
    } else {
      const d = await res.json();
      showToast(d.message || 'Error');
    }
  } catch(e) { showToast('Network error'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function t() {
  const h = document.documentElement;
  const d = h.getAttribute('data-theme') || 'light';
  const n = d === 'light' ? 'dark' : 'light';
  h.setAttribute('data-theme', n);
  try { localStorage.setItem('ogapay-theme', n) } catch(e) {}
  const i = document.getElementById('ti');
  if (i) i.className = n === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
}
(function() {
  const h = document.documentElement;
  h.setAttribute('data-theme', h.getAttribute('data-theme') || 'light');
  const d = document.getElementById('ti');
  if (d) d.className = h.getAttribute('data-theme') === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
})();

init();
</script>
</body>
</html>
