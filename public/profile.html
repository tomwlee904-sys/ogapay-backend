<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - OgaPay</title>
<script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ogapay-theme')||'dark')}catch(e){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#080b13;--bg2:#0d111d;--card:#111725;--border:#222b3c;--border2:#2d384d;--text:#f4f7fb;--text2:#9aa7bc;--text3:#667186;--primary:#f4f7fb;--accent:#7C3AED;--accent2:#3B82F6;--green:#16a34a;--red:#ef4444;--brand:linear-gradient(135deg,#7C3AED,#6366F1,#3B82F6);--shadow:0 4px 24px rgba(0,0,0,.3),0 1px 4px rgba(0,0,0,.2);--radius:14px;--radius-sm:10px;--nav-h:60px;
}
[data-theme="light"]{
  --bg:#f5f7fa;--bg2:#ffffff;--card:#ffffff;--border:#e4e9f1;--border2:#d5deea;--text:#0f141e;--text2:#64748b;--text3:#94a3b8;--primary:#0f141e;--brand:linear-gradient(135deg,#7C3AED,#6366F1,#3B82F6);
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;overflow-x:hidden}a{color:inherit;text-decoration:none}button,input,select,textarea{font:inherit}button{cursor:pointer}
.nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(8,11,19,.88);border-bottom:1px solid var(--border);backdrop-filter:blur(18px) saturate(1.4)}[data-theme="light"] .nav{background:rgba(255,255,255,.9)}
.nav-inner{height:100%;display:flex;align-items:center;justify-content:space-between;width:min(900px,calc(100% - 32px));margin:0 auto}.brand{display:flex;align-items:center;gap:8px;font-family:"Outfit";font-weight:800;font-size:17px}.logo{width:30px;height:30px;border-radius:8px;background:var(--primary);color:var(--bg);display:grid;place-items:center;font-size:16px}.nav-links{display:flex;gap:2px}.nav-link{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;color:var(--text3);font-size:13px;font-weight:600}.nav-link:hover,.nav-link.active{background:var(--bg2);color:var(--text)}.nav-actions{display:flex;align-items:center;gap:6px}.icon-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);display:grid;place-items:center}.icon-btn:hover{background:var(--bg2);color:var(--text)}.page-wrap{width:min(900px,calc(100% - 32px));margin:0 auto;padding:24px 0 72px}
.profile-head{display:flex;align-items:center;gap:18px;padding:20px 0 18px}.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--brand);display:grid;place-items:center;color:#fff;font-family:"Outfit";font-size:26px;font-weight:800;flex-shrink:0}.profile-info{flex:1;min-width:0}.profile-info h1{margin:0;font-family:"Outfit";font-size:20px;font-weight:800;letter-spacing:-.3px}.profile-info .meta{display:flex;align-items:center;gap:10px;margin-top:3px;color:var(--text2);font-size:13px;flex-wrap:wrap}.profile-info .meta span{display:inline-flex;align-items:center;gap:4px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}.form-card h3{margin:0 0 16px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}.field{display:grid;gap:5px;margin-bottom:14px}.field label{font-size:11px;font-weight:700;color:var(--text2)}.field input,.field select{height:40px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);padding:0 12px;outline:none;font-size:13px}.field input:focus,.field select:focus{border-color:var(--accent2)}.field input[readonly]{color:var(--text2);background:var(--bg)}.btn{height:36px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;font-weight:600;font-size:13px;transition:.15s;text-decoration:none;border:1px solid var(--border)}.btn:hover{background:var(--bg2);border-color:var(--border2)}.btn.primary{background:var(--primary);color:var(--bg);border-color:var(--primary)}.btn.danger{background:rgba(239,68,68,.15);color:var(--red);border-color:transparent}.btn.small{height:32px;padding:0 12px;font-size:12px}.row{display:flex;align-items:center;gap:10px}.row.space{justify-content:space-between}.switch{width:40px;height:22px;border-radius:999px;background:var(--border2);border:0;position:relative;transition:.2s;cursor:pointer}.switch.on{background:var(--accent2)}.switch:after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}.switch.on:after{left:20px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.stat{font-family:"Outfit";font-size:18px;font-weight:800}.small{font-size:11px;color:var(--text3);font-weight:600}
@media(max-width:700px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body data-page="profile.html">
<header class="nav"><div class="nav-inner"><a class="brand" href="index.html"><span class="logo">O</span>OgaPay</a><nav class="nav-links"><a class="nav-link" href="tasks.html"><i class="ti ti-briefcase"></i>Tasks</a><a class="nav-link" href="store.html"><i class="ti ti-discount-2"></i>Deals</a><a class="nav-link" href="wallet.html"><i class="ti ti-wallet"></i>Wallet</a></nav><div class="nav-actions"><button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i class="ti ti-sun"></i></button><a class="icon-btn" href="settings.html"><i class="ti ti-settings"></i></a></div></div></header>
<main class="page-wrap">
  <div class="profile-head">
    <div class="profile-avatar">AD</div>
    <div class="profile-info">
      <h1>Ada Danladi</h1>
      <div class="meta">
        <span><i class="ti ti-at"></i>@ada_earns</span>
        <span><i class="ti ti-badge"></i>Worker</span>
        <span><i class="ti ti-shield-check"></i>KYC verified</span>
        <span><i class="ti ti-mail"></i>ada@ogapay.ng</span>
      </div>
    </div>
  </div>
  <div class="grid-2">
    <div class="form-card">
      <h3>Personal info</h3>
      <div class="field"><label>First name</label><input value="Ada"></div>
      <div class="field"><label>Last name</label><input value="Danladi"></div>
      <div class="field"><label>Username</label><input value="ada_earns"></div>
      <div class="field"><label>Email</label><input value="ada@ogapay.ng"></div>
      <button class="btn primary">Update info</button>
    </div>
    <div class="form-card">
      <h3>Payout settings</h3>
      <div class="field"><label>Bank</label><select><option>Opay</option><option>GTBank</option><option>Kuda Bank</option><option>Access Bank</option><option>Moniepoint MFB</option><option>Zenith Bank</option></select></div>
      <div class="field"><label>Account number</label><input value="0123456789"></div>
      <div class="field"><label>Account name</label><input value="Ada Danladi"></div>
      <div class="field"><label>USDC wallet</label><input value="7xQp8NairaUsdc9mDa"></div>
      <button class="btn primary">Save payout details</button>
    </div>
  </div>
  <div class="form-card">
    <h3>Account settings</h3>
    <div class="field"><label>New password</label><input type="password" placeholder="Enter new password"></div>
    <div class="row space" style="margin-bottom:14px"><span style="font-size:13px">Email notifications</span><button class="switch on" data-toggle-label aria-label="Toggle email notifications"></button></div>
    <div class="row space" style="margin-bottom:14px"><span style="font-size:13px">Browser notifications</span><button class="switch on" data-toggle-label aria-label="Toggle browser notifications"></button></div>
    <div style="display:flex;gap:8px"><button class="btn primary">Update account</button><button class="btn danger">Delete account</button></div>
  </div>
</main>
<div class="toast" id="toast">Done</div>
<style>
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:99;background:var(--card);border-top:1px solid var(--border);padding:6px 12px 10px}
.mobile-bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:10px;font-weight:700;text-decoration:none;padding:4px 0}
.mobile-bottom-nav a.active{color:var(--accent2)}
.mobile-bottom-nav a svg{width:22px;height:22px}
.mobile-bottom-nav .create svg{width:28px;height:28px;stroke-width:2}
.profile-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);display:inline-block}
@media(max-width:860px){.nav-links{display:none}.mobile-bottom-nav{display:flex;justify-content:space-around;align-items:flex-end}}
</style>
<script>
(function(){const html=document.documentElement,theme=document.getElementById('themeToggle'),toast=document.getElementById('toast');function setTheme(v){html.setAttribute('data-theme',v);try{localStorage.setItem('ogapay-theme',v)}catch(e){} if(theme) theme.innerHTML='<i class="ti '+(v==='dark'?'ti-sun':'ti-moon')+'"></i>'}setTheme(html.getAttribute('data-theme')||'dark');theme&&theme.addEventListener('click',()=>setTheme(html.getAttribute('data-theme')==='dark'?'light':'dark'));function say(text){if(!toast)return;toast.textContent=text;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}document.querySelectorAll('[data-copy]').forEach(el=>el.addEventListener('click',()=>{navigator.clipboard&&navigator.clipboard.writeText(el.getAttribute('data-copy'));say('Copied')}));document.querySelectorAll('[data-toggle-label]').forEach(el=>el.addEventListener('click',()=>{el.classList.toggle('on');say(el.classList.contains('on')?'Enabled':'Disabled')}));})();
</script>
<script src="assets/ogapay-live.js"></script>
<nav class="mobile-bottom-nav">
  <a href="tasks.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13H4V7Z"/><path d="M9 5V3h6v2M8 11h8"/></svg><span>Jobs</span></a>
  <a href="store.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/></svg><span>Deals</span></a>
  <a href="post-task.html" class="create"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Create</span></a>
  <a href="notifications.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>Alerts</span></a>
  <a href="dashboard.html"><span class="profile-dot"></span><span>Profile</span></a>
</nav>
</body>
</html>
