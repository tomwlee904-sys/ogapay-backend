<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - OgaPay</title>
<script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ogapay-theme')||'light')}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{--bg:#ffffff;--bg2:#f7f9fc;--card:#ffffff;--border:#e4e9f1;--border2:#d5deea;--text:#101525;--text2:#66738a;--text3:#98a6ba;--primary:#0d1323;--accent:#7C3AED;--accent2:#2563EB;--brand-blue:linear-gradient(90deg,#2563EB,#3B82F6,#60A5FA,#93C5FD);--earn-gradient:linear-gradient(90deg,#7C3AED,#A78BFA,#6366F1,#C4B5FD,#7C3AED);--gold:#f5b301;--soft-purple:#f4f6fa;--soft-blue:#eef6ff;--shadow:0 4px 16px rgba(16,21,37,.07),0 1px 4px rgba(16,21,37,.04);--shadow-soft:0 2px 8px rgba(16,21,37,.05);--radius:14px;--nav-h:60px}
[data-theme="dark"]{--bg:#080b13;--bg2:#0d111d;--card:#111725;--border:#222b3c;--border2:#2d384d;--text:#f4f7fb;--text2:#9aa7bc;--text3:#667186;--primary:#f4f7fb;--accent:#A78BFA;--accent2:#60A5FA;--soft-purple:#111725;--soft-blue:#0d1d34;--shadow:0 4px 16px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.18);--shadow-soft:0 2px 8px rgba(0,0,0,.22)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;overflow-x:hidden}a{color:inherit;text-decoration:none}button,input,select,textarea{font:inherit}button{cursor:pointer}
.nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(255,255,255,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(18px) saturate(1.4)}[data-theme="dark"] .nav{background:rgba(8,11,19,.92)}
.nav-inner{height:100%;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:22px;width:min(1200px,calc(100% - 48px));margin:0 auto}.brand{display:flex;align-items:center;gap:10px;font-family:"Outfit";font-weight:800;font-size:19px}.logo{width:34px;height:34px;border-radius:9px;background:var(--primary);color:var(--bg);display:grid;place-items:center;font-size:18px}.nav-links{display:flex;justify-content:center;gap:4px}.nav-link{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;color:var(--text2);font-size:14px;font-weight:700}.nav-link:hover,.nav-link.active{background:var(--bg2);color:var(--text)}.nav-actions{display:flex;align-items:center;gap:8px}.icon-btn,.menu-btn{width:36px;height:36px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);display:grid;place-items:center}.icon-btn:hover,.menu-btn:hover{color:var(--text);background:var(--bg2);border-color:var(--border2)}.pill-btn{height:36px;border:1.5px solid var(--border2);border-radius:999px;background:var(--primary);color:var(--bg);display:inline-flex;align-items:center;gap:8px;padding:0 16px;font-weight:800;font-size:13px}
.main{flex:1;min-width:0}.page{width:min(600px,calc(100% - 48px));margin:0 auto;padding:48px 0 72px;text-align:center}.page h1{font-family:"Outfit";font-size:clamp(26px,3.5vw,38px);letter-spacing:-1px;margin:10px 0 8px}.lead{margin:0 0 24px;color:var(--text2);line-height:1.65}.card{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);padding:32px;box-shadow:var(--shadow-soft)}.pay-amount{font-family:"Outfit";font-size:clamp(36px,5vw,56px);font-weight:900;letter-spacing:-2px;margin:16px 0 4px;background:var(--earn-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.pay-label{color:var(--text3);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}.pay-meta{display:flex;justify-content:center;gap:24px;margin:12px 0 24px;flex-wrap:wrap}.pay-meta span{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:14px;font-weight:600}.pay-meta i{color:var(--accent2)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:10px;border:none;font-weight:800;font-size:15px;transition:all .15s;min-height:48px}.btn.primary{background:var(--primary);color:var(--bg)}.btn.primary:hover{opacity:.85}.btn.outline{border:1.5px solid var(--border2);background:var(--card);color:var(--text)}.btn.outline:hover{background:var(--bg2);border-color:var(--text2)}.btn:disabled{opacity:.5;cursor:not-allowed}.btn.large{width:100%;max-width:380px;font-size:16px;padding:14px 28px;margin:8px 0}.address-box{display:flex;align-items:center;gap:10px;border:1.5px dashed var(--border2);border-radius:10px;padding:12px 16px;background:var(--bg2);margin:12px 0 8px;word-break:break-all;font-size:13px;font-weight:600;cursor:pointer;text-align:left}.address-box i{color:var(--accent2);font-size:18px;flex-shrink:0}.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px}.status-badge.pending{background:#fef3c7;color:#92400e}.status-badge.completed{background:#d1fae5;color:#065f46}.status-badge.failed{background:#fee2e2;color:#991b1b}[data-theme="dark"] .status-badge.pending{background:rgba(251,191,36,.15);color:#fbbf24}[data-theme="dark"] .status-badge.completed{background:rgba(52,211,153,.15);color:#34d399}[data-theme="dark"] .status-badge.failed{background:rgba(248,113,113,.15);color:#f87171}.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:24px auto}@keyframes spin{to{transform:rotate(360deg)}}.error-box{padding:24px;color:var(--text2)}.error-box i{font-size:48px;color:var(--text3);margin-bottom:12px}.hidden{display:none!important}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.small{color:var(--text3);font-size:12px;font-weight:600}
@media(max-width:640px){.nav-links,.pill-btn{display:none}.nav-inner{width:min(100% - 28px,1200px)}.page{width:min(100% - 28px,600px);padding-top:24px}.pay-meta{gap:12px}.card{padding:20px}}
</style>
</head>
<body data-page="pay.html">
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--bg);padding:10px 24px;border-radius:999px;font-weight:700;font-size:14px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none">Copied</div>
<header class="nav"><div class="nav-inner"><a class="brand" href="index.html"><span class="logo"><i class="ti ti-layout-grid"></i></span><span>Oga<span>Pay</span></span></a><nav class="nav-links"><a class="nav-link" href="index.html" data-navlink><i class="ti ti-home"></i>Home</a><a class="nav-link" href="tasks.html" data-navlink><i class="ti ti-layout-grid"></i>Tasks</a><a class="nav-link" href="store.html" data-navlink><i class="ti ti-discount-2"></i>Deals</a><a class="nav-link" href="communities.html" data-navlink><i class="ti ti-users-group"></i>Communities</a><a class="nav-link" href="index.html#footer" data-navlink><i class="ti ti-help-circle"></i>FAQ</a></nav><div class="nav-actions"><a class="pill-btn nav-auth-only" href="post-task.html"><i class="ti ti-square-plus"></i>Post Task</a><button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode"><i class="ti ti-moon"></i></button></div></div></header>
<div class="main"><div class="page" id="app">
  <div id="loading"><div class="spinner"></div><p class="lead">Loading payment details...</p></div>
  <div id="content" class="hidden">
    <div class="eyebrow" style="display:inline-flex"><i class="ti ti-wallet"></i><span>Payment</span></div>
    <h1>Complete Payment</h1>
    <p class="lead" id="leadText">Complete your deposit to fund your OgaPay wallet.</p>
    <div class="card" style="max-width:480px;margin:0 auto">
      <div class="pay-label">Amount Due</div>
      <div class="pay-amount" id="payAmount">--</div>
      <div class="pay-meta" id="payMeta"></div>
      <div id="providerContent"></div>
      <div id="statusContent" class="mt-16"></div>
      <div id="pollNotice" class="mt-16 small hidden">
        <i class="ti ti-refresh"></i> Auto-checking every 5s...
      </div>
    </div>
    <div class="mt-16"><a href="wallet.html" class="btn outline"><i class="ti ti-arrow-left"></i>Back to Wallet</a></div>
  </div>
</div></div>
<script>
(function(){const html=document.documentElement,theme=document.getElementById('themeToggle'),toast=document.getElementById('toast');function setTheme(v){html.setAttribute('data-theme',v);try{localStorage.setItem('ogapay-theme',v)}catch(e){}if(theme)theme.innerHTML='<i class="ti '+(v==='dark'?'ti-sun':'ti-moon')+'"></i>'}setTheme(html.getAttribute('data-theme')||'light');theme&&theme.addEventListener('click',()=>setTheme(html.getAttribute('data-theme')==='dark'?'light':'dark'));function say(text){if(!toast)return;toast.textContent=text;toast.classList.add('show');toast.style.opacity='1';setTimeout(()=>toast.style.opacity='0',1800)}window.__say=say;
const API_BASE=(window.OGAPAY_API_BASE||localStorage.getItem('ogapay_api_base')||'/v1').replace(/\/$/,'');const tokenKey='ogapay_access_token';function token(){return localStorage.getItem(tokenKey)}function authHeaders(){return token()?{Authorization:'Bearer '+token()}:{}}
async function api(path,options){const init=options||{};const headers={Accept:'application/json',...(init.body&&!(init.body instanceof FormData)?{'Content-Type':'application/json'}:{}),...authHeaders(),...(init.headers||{})};const res=await fetch(API_BASE+path,{...init,headers});const text=await res.text();let json={};try{json=text?JSON.parse(text):{}}catch(e){json={message:text}}if(!res.ok)throw new Error(json.message||'Request failed ('+res.status+')');return json}
function unwrap(json){return json&&Object.prototype.hasOwnProperty.call(json,'data')?json.data:json}
function money(value,currency){const amount=Number(value||0);if(currency==='NGN')return new Intl.NumberFormat('en-NG',{style:'currency',currency:'NGN',maximumFractionDigits:0}).format(amount);return amount.toLocaleString(undefined,{maximumFractionDigits:6})+' '+currency}
const reference=window.location.pathname.split('/').pop();if(!reference||reference==='pay.html'){document.getElementById('loading').classList.add('hidden');document.getElementById('content').classList.remove('hidden');document.getElementById('payAmount').textContent='--';document.getElementById('providerContent').innerHTML='<div class="error-box"><i class="ti ti-circle-x"></i><p>No payment reference provided.</p></div>'}else{loadPayment(reference)}
async function loadPayment(ref){const loading=document.getElementById('loading'),content=document.getElementById('content'),app=document.getElementById('app');try{const data=unwrap(await api('/payments/'+ref));loading.classList.add('hidden');content.classList.remove('hidden');renderPayment(data)}catch(e){loading.classList.add('hidden');content.classList.remove('hidden');document.getElementById('providerContent').innerHTML='<div class="error-box"><i class="ti ti-circle-x"></i><p>'+e.message+'</p></div>'}}
function renderPayment(data){const payAmount=document.getElementById('payAmount'),payMeta=document.getElementById('payMeta'),leadText=document.getElementById('leadText'),providerContent=document.getElementById('providerContent'),statusContent=document.getElementById('statusContent'),pollNotice=document.getElementById('pollNotice')
payAmount.textContent=money(data.amount,data.currency);
payMeta.innerHTML='<span><i class="ti ti-currency-'+(data.currency==='NGN'?'naira':'dollar')+'"></i>'+data.currency+'</span><span><i class="ti ti-building-bank"></i>'+data.provider+'</span><span><i class="ti ti-hash"></i>#'+data.reference.slice(-8)+'</span>';
if(data.status==='COMPLETED'){leadText.textContent='This payment has been completed successfully.';providerContent.innerHTML='<div style="padding:16px 0"><div class="status-badge completed"><i class="ti ti-circle-check"></i>Completed</div></div>';statusContent.innerHTML='<a href="wallet.html" class="btn primary large"><i class="ti ti-wallet"></i>Go to Wallet</a>';return}
if(data.status==='FAILED'){leadText.textContent='This payment failed. Please try again.';providerContent.innerHTML='<div style="padding:16px 0"><div class="status-badge failed"><i class="ti ti-circle-x"></i>Failed</div></div>';statusContent.innerHTML='<a href="wallet.html" class="btn outline large"><i class="ti ti-refresh"></i>Try Again</a>';return}
if(data.provider==='FLUTTERWAVE'||data.provider==='PAYSTACK'){const payUrl=data.metadata?.paymentUrl||data.paymentUrl||data.metadata?.redirectUrl;providerContent.innerHTML='<div style="padding:12px 0"><p class="small mb-8">You will be redirected to '+data.provider+' to complete payment.</p><button class="btn primary large" id="payNowBtn" onclick="window.location.href=\''+payUrl+'\'"><i class="ti ti-external-link"></i>Pay with '+data.provider+'</button></div>';pollNotice.classList.remove('hidden');startPolling(data.reference)}
else if(data.provider==='CRYPTO'){const addr=data.metadata?.depositAddress||data.paymentData?.depositAddress||'Pending...';const network=data.metadata?.network||data.paymentData?.network||'Solana';providerContent.innerHTML='<div style="padding:8px 0"><p class="small mb-8">Send exactly <strong>'+money(data.amount,data.currency)+'</strong> to the address below on <strong>'+network+'</strong>:</p><div class="address-box" onclick="copyAddress(this)"><i class="ti ti-wallet"></i><span id="cryptoAddress">'+addr+'</span><i class="ti ti-copy" style="margin-left:auto;flex-shrink:0;color:var(--accent2)"></i></div><p class="small">The network confirms within seconds. Funds auto-credit once detected.</p></div>';pollNotice.classList.remove('hidden');startPolling(data.reference)}
else{providerContent.innerHTML='<div class="error-box"><i class="ti ti-building-bank"></i><p>Unsupported payment provider: '+data.provider+'</p></div>'}}
let pollTimer=null;function startPolling(ref){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>verifyPayment(ref),5000)}
async function verifyPayment(ref){try{const data=unwrap(await api('/payments/'+ref+'/verify',{method:'POST'}));if(data.status==='COMPLETED'){if(pollTimer){clearInterval(pollTimer);pollTimer=null}document.getElementById('pollNotice').classList.add('hidden');document.getElementById('leadText').textContent='Payment confirmed! Your wallet has been funded.';document.getElementById('providerContent').innerHTML='<div style="padding:16px 0"><div class="status-badge completed"><i class="ti ti-circle-check"></i>Completed</div></div>';document.getElementById('statusContent').innerHTML='<a href="wallet.html" class="btn primary large"><i class="ti ti-wallet"></i>Go to Wallet</a>';document.getElementById('payAmount').textContent=money(data.amount,data.currency)}}catch(e){}}
function copyAddress(el){const addr=el.querySelector('span').textContent;navigator.clipboard&&navigator.clipboard.writeText(addr);window.__say('Address copied')}
</script>
</body>
</html>
