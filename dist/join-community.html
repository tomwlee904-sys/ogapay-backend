<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Community - OgaPay</title>
<script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ogapay-theme')||'dark')}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050816;--bg2:#080B1A;--card:#0B1020;--card2:#0F1428;--border:#1A2040;--border2:#2A3070;--text:#FFFFFF;--text2:#8B8FA3;--text3:#5C6080;--accent:#3B82F6;--accent2:#2563EB;--accent-dim:rgba(59,130,246,.12);--green:#22C55E;--shadow:0 4px 24px rgba(0,0,0,.5);--radius:14px;--radius-sm:10px;--nav-h:60px}
[data-theme="light"]{--bg:#050816;--bg2:#080B1A;--card:#0B1020;--card2:#0F1428;--border:#1A2040;--border2:#2A3070;--text:#FFFFFF;--text2:#8B8FA3;--text3:#5C6080;--accent:#3B82F6}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer}input,select,textarea{font:inherit}img{max-width:100%;display:block}
.nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(5,8,22,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(18px) saturate(1.4)}
.nav-inner{height:100%;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:28px;width:min(1200px,calc(100% - 48px));margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;font-family:"Outfit",sans-serif;font-size:19px;font-weight:800;letter-spacing:-.4px;white-space:nowrap}
.logo-mark{width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:9px;overflow:hidden}
.logo-mark svg{width:100%;height:100%;display:block;border-radius:9px}
.brand span span{color:var(--text)}
.nav-links{display:flex;align-items:center;justify-content:center;gap:4px}
.nav-link{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;color:var(--text2);font-size:14px;font-weight:600;line-height:1;transition:all .14s}
.nav-link svg{width:15px;height:15px;stroke-width:2.2;flex-shrink:0}
.nav-link.active,.nav-link:hover{color:var(--text);background:var(--bg2)}
.nav-actions{display:flex;align-items:center;gap:8px}
.wallet-btn{height:36px;padding:0 14px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.wallet-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);font-size:18px;line-height:1;display:grid;place-items:center;transition:all .2s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.mobile-menu{display:none;position:fixed;inset:0;z-index:150}
.mobile-menu.open{display:block}
.mobile-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.oga-drawer{position:absolute;right:0;top:0;bottom:0;width:min(360px,88vw);background:#0B1020;border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s}
.mobile-menu.open .oga-drawer{transform:translateX(0)}
.oga-drawer-head{height:60px;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.oga-drawer-close{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);display:grid;place-items:center;cursor:pointer}
.oga-drawer-nav{padding:12px;overflow-y:auto;flex:1}
.oga-drawer-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--text2);text-decoration:none;font-weight:600;font-size:14px;transition:all .14s}
.oga-drawer-item:hover{background:var(--card2);color:var(--text)}
.oga-drawer-item svg{width:18px;height:18px;color:var(--accent)}
.oga-drawer-foot{padding:12px;border-top:1px solid var(--border)}
.oga-drawer-actions{display:flex;gap:10px}
.oga-drawer-actions .wallet-btn{flex:1;justify-content:center}
.authed-only{display:none!important}.public-only{display:flex!important}
body[data-auth="authed"] .authed-only{display:flex!important}
body[data-auth="authed"] .public-only{display:none!important}
.main-wrap{flex:1;width:min(800px,calc(100% - 32px));margin:0 auto;padding:calc(var(--nav-h) + 16px) 0 60px}
@keyframes fadeIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

.join-header{text-align:center;margin-bottom:28px}
.join-header h1{font-family:Outfit;font-size:28px;font-weight:900;margin:0 0 6px;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.join-header p{color:var(--text2);font-size:14px;margin:0}
.steps-bar{display:flex;justify-content:center;gap:8px;margin-bottom:28px;align-items:center}
.step-dot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;border:2px solid var(--border);color:var(--text3);transition:all .3s}
.step-dot.active{border-color:var(--accent);background:var(--accent);color:#fff}
.step-dot.done{border-color:var(--green);background:var(--green);color:#fff}
.step-line{width:32px;height:2px;background:var(--border)}
.step-line.done{background:var(--green)}

.join-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;animation:fadeIn .3s ease}
@media(max-width:640px){.join-card{padding:20px}}
.join-card h2{font-family:Outfit;font-size:20px;font-weight:800;margin:0 0 4px}
.join-card .jc-sub{color:var(--text2);font-size:14px;margin:0 0 20px}

.preview-community{display:flex;gap:16px;align-items:center;padding:16px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:20px}
.preview-community .pc-av{width:56px;height:56px;border-radius:50%;background:var(--accent-dim);display:grid;place-items:center;font-size:22px;font-weight:800;color:var(--accent);flex-shrink:0}
.preview-community .pc-info h3{font-size:17px;font-weight:700;margin:0}
.preview-community .pc-info p{color:var(--text2);font-size:13px;margin:2px 0 0}

.req-list{display:grid;gap:10px;margin-bottom:20px}
.req-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm)}
.req-item .ri-icon{width:20px;height:20px;flex-shrink:0}
.req-item .ri-icon.green{color:var(--green)}
.req-item .ri-icon.yellow{color:var(--gold)}
.req-item .ri-icon.red{color:#EF4444}
.req-item .ri-text{font-size:14px;flex:1}
.req-item .ri-text strong{font-weight:600}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-group textarea{resize:vertical;min-height:80px}
.upload-area{height:100px;border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;transition:all .2s;background:var(--bg2)}
.upload-area:hover{border-color:var(--accent);color:var(--accent)}
.upload-area svg{width:24px;height:24px;margin-bottom:4px}
.upload-area span{font-size:12px}

.wizard-actions{display:flex;gap:12px;margin-top:24px;justify-content:space-between}
.wizard-actions .btn{height:44px;padding:0 24px;border-radius:10px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.btn-back{border:1px solid var(--border);background:transparent;color:var(--text2)}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.btn-next{border:0;background:var(--accent);color:#fff}
.btn-next:hover{box-shadow:0 4px 20px rgba(59,130,246,.3)}

.success-state{text-align:center;padding:48px 24px}
.success-state svg{width:64px;height:64px;color:var(--green);margin-bottom:16px}
.success-state h2{font-family:Outfit;font-size:24px;font-weight:800;margin:0 0 8px}
.success-state p{color:var(--text2);font-size:14px;margin:0 0 24px}

.summary-grid{display:grid;gap:10px;max-width:400px;margin:0 auto 20px}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.summary-row strong{font-weight:600}
.summary-row span:last-child{color:var(--text2)}

.site-footer{position:relative;overflow:hidden;padding:40px 24px 24px;background:linear-gradient(180deg,var(--bg) 0%,#000 100%);border-top:1px solid var(--border);margin-top:auto}
.site-footer video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.15;pointer-events:none}
.footer-overlay{position:relative;z-index:1;max-width:1120px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:24px;margin-bottom:24px}
@media(max-width:768px){.footer-grid{grid-template-columns:1fr 1fr;gap:16px}}
.footer-brand{display:flex;align-items:center;gap:10px;font-family:Outfit;font-size:20px;font-weight:900;margin-bottom:8px}
.footer-brand .logo-mark{width:26px;height:26px}
.footer-desc{color:var(--text2);font-size:13px;line-height:1.5;margin-bottom:12px;max-width:240px}
.footer-col h4{font-size:13px;font-weight:700;margin:0 0 10px;color:var(--text)}
.footer-col nav{display:grid;gap:6px}
.footer-col a{color:var(--text2);font-size:12px;transition:color .2s}
.footer-col a:hover{color:var(--accent)}
.footer-bottom{display:flex;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border);color:var(--text3);font-size:12px;flex-wrap:wrap;gap:8px}
@media(max-width:768px){.nav-links{display:none}.nav-actions .wallet-btn .wallet-label{display:none}}
</style>
</head>
<body>
<header class="nav"><div class="nav-inner"><a class="brand" href="index.html"><span class="logo-mark"><svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="white"/><rect x="98" y="98" width="107" height="107" rx="20" fill="black"/><path d="M225 98H312C323 98 332 107 332 118V205H225V98Z" fill="black"/><path d="M352 98H392C440 98 470 128 470 176V205H352V98Z" fill="black"/><rect x="98" y="225" width="107" height="107" fill="black"/><rect x="225" y="225" width="107" height="107" fill="black"/><path d="M352 225H470V254C470 302 440 332 392 332H352V225Z" fill="black"/><rect x="98" y="352" width="107" height="107" rx="20" fill="black"/><path d="M225 352H312C323 352 332 361 332 372V439C332 450 323 459 312 459H225V352Z" fill="black"/></svg></span><span>Oga<span>Pay</span></span></a><nav class="nav-links"><a class="nav-link" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a><a class="nav-link" href="communities.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Communities</a><a class="nav-link active" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Join</a></nav><div class="nav-actions"><button class="icon-btn" id="themeToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><button class="icon-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button></div></div></header>

<div class="main-wrap">
<div class="join-header"><h1>Join Community</h1><p>Complete the steps to become a member</p></div>
<div class="steps-bar" id="stepsBar"></div>
<div id="joinContent"></div>
</div>

<footer class="site-footer"><video autoplay muted loop playsinline poster=""><source src="https://ogapay-five.vercel.app/videos/ogapay-bg.mp4" type="video/mp4"></video><div class="footer-overlay"><div class="footer-grid"><div><div class="footer-brand"><span class="logo-mark"><svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="white"/><rect x="98" y="98" width="107" height="107" rx="20" fill="black"/><path d="M225 98H312C323 98 332 107 332 118V205H225V98Z" fill="black"/><path d="M352 98H392C440 98 470 128 470 176V205H352V98Z" fill="black"/><rect x="98" y="225" width="107" height="107" fill="black"/><rect x="225" y="225" width="107" height="107" fill="black"/><path d="M352 225H470V254C470 302 440 332 392 332H352V225Z" fill="black"/><rect x="98" y="352" width="107" height="107" rx="20" fill="black"/><path d="M225 352H312C323 352 332 361 332 372V439C332 450 323 459 312 459H225V352Z" fill="black"/></svg></span>OgaPay</div></div></div><div class="footer-bottom"><span>&copy; 2026 OgaPay.</span></div></div></footer>

<script>
const COMMUNITIES = [
  {id:1,name:'Solana Builders',members:2840,desc:'Building the future on Solana.',initials:'SB'},
  {id:2,name:'Design Masters',members:1820,desc:'Premium design resources and feedback.',initials:'DM'},
  {id:3,name:'Content Creators Hub',members:3150,desc:'Create, share, and earn.',initials:'CC'},
];

let step = 1;
let msg = '';let portfolio = '';let community = null;

function $(id){return document.getElementById(id)}
function html(el,h){el.innerHTML=h}

function renderSteps(){
  html($('stepsBar'),['Preview','Requirements','Request','Review'].map((s,i)=>{
    const n=i+1;let cls='step-dot';if(n===step)cls+=' active';else if(n<step)cls+=' done';
    return '<div style="display:flex;align-items:center;gap:6px">'+(i>0?'<div class="step-line'+(n<=step?' done':'')+'"></div>':'')+
      '<div class="'+cls+'">'+(n<step?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':n)+'</div></div>';
  }).join(''));
}

function renderJoin(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id')||1;
  community = COMMUNITIES.find(c=>c.id===Number(id))||COMMUNITIES[0];
  const jc = $('joinContent');
  let h='';
  switch(step){
    case 1:
      h='<div class="join-card"><h2>Community Preview</h2><p class="jc-sub">Review the community before joining</p>'+
        '<div class="preview-community"><div class="pc-av">'+community.initials+'</div><div class="pc-info"><h3>'+community.name+'</h3><p>'+community.desc+'</p><div style="margin-top:4px;color:var(--text3);font-size:12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> '+community.members.toLocaleString()+' members</div></div></div>'+
        '<div class="wizard-actions"><div></div><button class="btn btn-next" onclick="nextStep()">Continue <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button></div></div>';
      break;
    case 2:
      h='<div class="join-card"><h2>Requirements</h2><p class="jc-sub">Check what\'s needed to join</p><div class="req-list">'+
        '<div class="req-item"><svg class="ri-icon green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="ri-text"><strong>Verification:</strong> Not required</span></div>'+
        '<div class="req-item"><svg class="ri-icon green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="ri-text"><strong>Minimum Level:</strong> No minimum</span></div>'+
        '<div class="req-item"><svg class="ri-icon yellow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="ri-text"><strong>Invite Code:</strong> Optional</span></div>'+
        '<div class="req-item"><svg class="ri-icon green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="ri-text"><strong>Entry Task:</strong> Not required</span></div>'+
      '</div><div class="wizard-actions"><button class="btn btn-back" onclick="prevStep()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Back</button><button class="btn btn-next" onclick="nextStep()">Continue <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button></div></div>';
      break;
    case 3:
      h='<div class="join-card"><h2>Join Request</h2><p class="jc-sub">Tell the community about yourself</p>'+
        '<div class="form-group"><label>Message</label><textarea id="fMsg" placeholder="Introduce yourself and explain why you want to join this community...">'+msg+'</textarea></div>'+
        '<div class="form-group"><label>Attachments</label><div class="upload-area" onclick="document.getElementById(\'attInput\').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg><span>Attach portfolio links or files</span></div><input type="file" id="attInput" style="display:none"></div>'+
        '<div class="form-group"><label>Portfolio Link</label><input id="fPort" placeholder="https://" value="'+portfolio+'"></div>'+
        '<div class="wizard-actions"><button class="btn btn-back" onclick="prevStep()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Back</button><button class="btn btn-next" onclick="nextStep()">Continue <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button></div></div>';
      break;
    case 4:
      h='<div class="join-card"><h2>Review & Submit</h2><p class="jc-sub">Confirm your join request</p><div class="summary-grid">'+
        '<div class="summary-row"><strong>Community</strong><span>'+community.name+'</span></div><div class="summary-row"><strong>Message</strong><span>'+(msg?'Submitted':'None')+'</span></div></div>'+
        '<div class="wizard-actions"><button class="btn btn-back" onclick="prevStep()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Back</button><button class="btn btn-next" onclick="submitJoin()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>Submit Request</button></div></div>';
      break;
  }
  if(step>4){
    h='<div class="join-card"><div class="success-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><h2>Request Submitted!</h2><p>Your join request has been sent to the community moderators. You will be notified when approved.</p><button class="btn btn-next" onclick="window.location.href=\'community-profile.html?id='+community.id+'\'">View Community</button></div></div>';
  }
  jc.innerHTML=h;renderSteps();
}

function nextStep(){
  if(step===3){msg=($('fMsg')?.value||'');portfolio=($('fPort')?.value||'')}
  step++;renderJoin();window.scrollTo({top:0,behavior:'smooth'});
}
function prevStep(){step--;renderJoin();window.scrollTo({top:0,behavior:'smooth'});}
function submitJoin(){step=5;renderJoin();}

renderJoin();

(function(){
  try{var th=localStorage.getItem('ogapay-theme')||'dark';document.documentElement.setAttribute('data-theme',th);}catch(e){}
  try{var authed=localStorage.getItem('ogapay-authenticated')==='true';document.body.setAttribute('data-auth',authed?'authed':'public');}catch(e){}
  var t=document.getElementById('themeToggle');if(t){t.addEventListener('click',function(){var h=document.documentElement;h.setAttribute('data-theme','dark');try{localStorage.setItem('ogapay-theme',next);}catch(e){}});}
  var m=document.getElementById('menuBtn'),mm=document.getElementById('mobileMenu');if(m&&mm){m.addEventListener('click',function(){mm.classList.add('open');});mm.querySelectorAll('[data-close-menu]').forEach(function(e){e.addEventListener('click',function(){mm.classList.remove('open');});});}
})();
