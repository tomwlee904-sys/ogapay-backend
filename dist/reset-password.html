<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password | OgaPay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",system-ui,sans-serif;background:#f2f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:480px;background:#fff;border-radius:24px;box-shadow:0 24px 80px rgba(3,3,65,.14),0 8px 32px rgba(3,3,65,.08);padding:48px 40px}
.logo{display:flex;align-items:center;gap:10px;font-family:"Outfit",sans-serif;font-size:18px;font-weight:800;margin-bottom:8px}
.logo svg{width:32px;height:32px;border-radius:8px;overflow:hidden}
h1{font-family:"Outfit",sans-serif;font-size:28px;font-weight:900;letter-spacing:-.6px;color:#0F172A;margin:0 0 6px}
.sub{color:#66738a;font-size:15px;margin:0 0 28px;line-height:1.5}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:700;color:#0F172A;margin-bottom:6px}
.input-group input{width:100%;height:56px;padding:0 16px;border:1.5px solid #e3e9f2;border-radius:14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;box-sizing:border-box}
.input-group input:focus{border-color:#4D5DFF}
.btn{width:100%;height:56px;border:none;border-radius:14px;background:#4D5DFF;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:#3b4de0}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{font-size:13px;margin:14px 0 0;text-align:center;line-height:1.5}
.msg.error{color:#dc2626}
.msg.success{color:#16a34a}
@media(max-width:480px){body{padding:12px}.card{padding:32px 24px;border-radius:20px}}
</style>
<style>
</style>
</head>
<body>
<div class="card" id="app">
  <div class="logo">
    <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#030341"/><rect x="98" y="98" width="107" height="107" rx="20" fill="white"/><path d="M225 98H312C323 98 332 107 332 118V205H225V98Z" fill="white"/><path d="M352 98H392C440 98 470 128 470 176V205H352V98Z" fill="white"/><rect x="98" y="225" width="107" height="107" fill="white"/><rect x="225" y="225" width="107" height="107" fill="white"/><path d="M352 225H470V254C470 302 440 332 392 332H352V225Z" fill="white"/><rect x="98" y="352" width="107" height="107" rx="20" fill="white"/><path d="M225 352H312C323 352 332 361 332 372V439C332 450 323 459 312 459H225V352Z" fill="white"/></svg>
    <span>OgaPay</span>
  </div>

  <div id="validView">
    <h1>Reset your password</h1>
    <p class="sub">Enter your new password below.</p>

    <div class="input-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" />
    </div>
    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
    </div>

    <button class="btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
    <p class="msg" id="message"></p>
    <p style="text-align:center;margin-top:20px"><a href="login.html" style="color:#4D5DFF;font-size:14px;font-weight:600;text-decoration:none">Back to login</a></p>
  </div>

  <div id="successView" style="display:none;text-align:center;padding:20px 0">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <h1 style="margin-top:16px">Password reset!</h1>
    <p class="sub">Your password has been updated. You can now log in with your new password.</p>
    <a href="login.html" style="display:inline-flex;align-items:center;justify-content:center;height:56px;padding:0 32px;border-radius:14px;background:#4D5DFF;color:#fff;font-size:16px;font-weight:700;text-decoration:none;margin-top:12px">Back to Login</a>
  </div>
</div>

<script>
const API_BASE = 'https://ogapay-production.up.railway.app/api/v1';

// Read token from URL
const params = new URLSearchParams(location.search);
const token = params.get('token');

if (!token) {
  document.getElementById('validView').innerHTML = `
    <h1>Invalid link</h1>
    <p class="sub">This password reset link is invalid or has expired. Please request a new one.</p>
    <a href="login.html" style="display:inline-flex;align-items:center;justify-content:center;height:56px;padding:0 32px;border-radius:14px;background:#4D5DFF;color:#fff;font-size:16px;font-weight:700;text-decoration:none;margin-top:12px">Back to Login</a>
  `;
} else {
  document.getElementById('validView').style.display = 'block';
}

async function resetPassword() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const msgEl = document.getElementById('message');
  const btn = document.getElementById('resetBtn');

  if (!newPassword || newPassword.length < 8) {
    msgEl.className = 'msg error';
    msgEl.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (newPassword !== confirmPassword) {
    msgEl.className = 'msg error';
    msgEl.textContent = 'Passwords do not match.';
    return;
  }

  msgEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    const res = await fetch(API_BASE + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword })
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || 'Reset failed');
    
    document.getElementById('validView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  } catch (err) {
    msgEl.className = 'msg error';
    msgEl.textContent = err.message || 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
